<body class="flex flex-col min-h-screen">

<!-- Main Content -->

<!-- Password Field -->

<button class="absolute right-md text-outline" type="button">

</button>
</div>
</div>
<!-- Sign In Button -->

<!-- Divider -->

<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md font-label-caps text-label-caps text-outline bg-transparent uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>

</div>
<span class="font-label-caps text-label-caps text-on-background">Google</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface border border-outline-variant py-3 rounded-lg hover:bg-surface-variant transition-colors active:scale-95">
<div class="w-5 h-5 flex items-center justify-center bg-[#0077b5] rounded-sm">

<a class="underline" href="#">Terms of Service</a> &amp; <a class="underline" href="#">Privacy Policy</a>
</p>

</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('scale-95');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('scale-95');
            });
        });

        // Simple floating animation for the background elements
        const blobs = document.querySelectorAll('.fixed > div');
        blobs.forEach((blob, index) => {
            let x = 0;
            let y = 0;
            let dx = (index + 1) * 0.2;
            let dy = (index + 1) * 0.15;
            
            function animate() {
                x += dx;
                y += dy;
                if(x > 20 || x < -20) dx *= -1;
                if(y > 20 || y < -20) dy *= -1;
                blob.style.transform = `translate(${x}px, ${y}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>

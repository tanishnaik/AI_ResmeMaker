<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[48px] pl-11 pr-4 bg-surface dark:bg-surface-dim border border-outline-variant dark:border-outline rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-on-surface dark:text-inverse-on-surface" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface dark:text-inverse-on-surface" for="password">
                                Password

<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>

</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[48px] bg-primary-container text-on-primary-container rounded-lg font-label-md text-label-md font-bold flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/20" type="submit">
                        Sign In to Suite

<!-- Interactive micro-script -->
<script>
        // Subtle focus animation for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.group').style.transform = 'translateY(-2px)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.group').style.transform = 'translateY(0)';
            });
        });

        // Theme Switcher Logic (Simulated for this demo)
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
